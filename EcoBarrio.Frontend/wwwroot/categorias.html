<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categorías</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
<div class="container">
<a class="navbar-brand fw-bold" href="index.html">♻️ EcoBarrio Manager</a>

<div>
<a class="btn btn-light btn-sm" href="index.html">Inicio</a>

<a class="btn btn-light btn-sm" href="categorias.html">Categorías</a>
</div>
</div>
</nav>

<div class="container my-5">

<h1 class="page-title mb-4">Gestión de Categorías</h1>

<div class="row">

<div class="col-md-4">
<div class="table-container">

<h4>Nueva Categoría</h4>

<form id="formCategoria">

<div class="mb-3">
<label>Nombre</label>
<input type="text" id="nombre" class="form-control" required>
</div>

<div class="mb-3">
<label>Descripción</label>
<input type="text" id="descripcion" class="form-control" required>
</div>

<button class="btn btn-success w-100">
Guardar Categoría
</button>

</form>

<div id="mensaje" class="mt-3"></div>

</div>
</div>

<div class="col-md-8">
<div class="table-container">

<h4>Listado</h4>

<table class="table table-striped mt-3">
<thead class="table-success">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Descripción</th>
</tr>
</thead>

<tbody id="tablaCategorias">
<tr>
<td colspan="3">Cargando...</td>
</tr>
</tbody>

</table>

</div>
</div>

</div>
</div>

<script src="js/categorias.js"></script>

</body>
</html>

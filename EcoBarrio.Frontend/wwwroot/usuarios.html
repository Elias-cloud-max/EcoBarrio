<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - EcoBarrio Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">♻️ EcoBarrio Manager</a>

        <div>
            <a class="btn btn-light btn-sm" href="index.html">Inicio</a>
            <a class="btn btn-light btn-sm" href="usuarios.html">Usuarios</a>
            <a class="btn btn-light btn-sm" href="#">Categorías</a>
            <a class="btn btn-light btn-sm" href="#">Materiales</a>
            <a class="btn btn-light btn-sm" href="#">Entregas</a>
        </div>
    </div>
</nav>

<div class="container my-5">

    <h1 class="page-title mb-4">Gestión de Usuarios</h1>

    <div class="row">

        <div class="col-md-4">
            <div class="table-container">
                <h4>Registrar Usuario</h4>

                <form id="formUsuario">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" id="nombre" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" id="telefono" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Dirección</label>
                        <input type="text" id="direccion" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Guardar Usuario
                    </button>
                </form>

                <div id="mensaje" class="mt-3"></div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="table-container">
                <h4>Listado de Usuarios</h4>

                <table class="table table-striped mt-3">
                    <thead class="table-success">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Teléfono</th>
                            <th>Dirección</th>
                        </tr>
                    </thead>
                    <tbody id="tablaUsuarios">
                        <tr>
                            <td colspan="4" class="text-center">Cargando usuarios...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<footer class="bg-success text-white text-center py-3">
    GreenTech Solutions RD © 2026
</footer>

<script src="js/usuarios.js"></script>
</body>
</html>

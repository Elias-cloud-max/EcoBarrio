<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entregas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
<div class="container">
<a class="navbar-brand fw-bold" href="index.html">♻️ EcoBarrio Manager</a>

<div>
<a class="btn btn-light btn-sm" href="index.html">Inicio</a>
<a class="btn btn-light btn-sm" href="usuarios.html">Usuarios</a>
<a class="btn btn-light btn-sm" href="categorias.html">Categorías</a>
<a class="btn btn-light btn-sm" href="materiales.html">Materiales</a>
<a class="btn btn-light btn-sm" href="entregas.html">Entregas</a>
</div>
</div>
</nav>

<div class="container my-5">

<h1 class="page-title mb-4">Registro de Entregas</h1>

<div class="row">

<div class="col-md-4">
<div class="table-container">

<h4>Nueva Entrega</h4>

<form id="formEntrega">

<div class="mb-3">
<label>Usuario</label>
<select id="usuarioId" class="form-control" required></select>
</div>

<div class="mb-3">
<label>Material</label>
<select id="materialId" class="form-control" required></select>
</div>

<div class="mb-3">
<label>Peso (Kg)</label>
<input type="number" step="0.01" id="pesoKg" class="form-control" required>
</div>

<button class="btn btn-success w-100">
Guardar Entrega
</button>

</form>

<div id="mensaje" class="mt-3"></div>

</div>
</div>

<div class="col-md-8">
<div class="table-container">

<h4>Historial</h4>

<table class="table table-striped mt-3">
<thead class="table-success">
<tr>
<th>ID</th>
<th>Usuario</th>
<th>Material</th>
<th>Peso</th>
<th>Fecha</th>
</tr>
</thead>

<tbody id="tablaEntregas">
<tr>
<td colspan="5">Cargando...</td>
</tr>
</tbody>

</table>

</div>
</div>

</div>
</div>

<footer class="bg-success text-white text-center py-3">
GreenTech Solutions RD © 2026
</footer>

<script src="js/entregas.js"></script>

</body>
</html>
